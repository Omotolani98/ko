name: Release CLI

on:
  push:
    tags:
      - "ko-cli/v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: ko-cli/go.sum

      # Strip ko-cli/ prefix so GoReleaser sees a clean semver tag
      - name: Retag for GoReleaser
        run: |
          TAG=${GITHUB_REF#refs/tags/ko-cli/}
          git tag -f "$TAG"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
          workdir: ko-cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
